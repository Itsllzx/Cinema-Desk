<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>دفتر سینما | فیلم‌ها و پلی‌لیست</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1c, #03060c);
            color: #eef4ff;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            padding: 18px 16px 30px;
        }
        :root {
            --bg-deep: #0B1120;
            --card-bg: rgba(18, 28, 40, 0.8);
            --gold: #F59E0B;
            --gold-light: #FFB74D;
            --border-dim: #2a3448;
        }
        .container { max-width: 700px; margin: 0 auto; position: relative; }
        .page { transition: 0.2s; }
        .hidden-page { display: none; }

        /* نوار بالای صفحه */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            background: rgba(0,0,0,0.4);
            padding: 10px 16px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            background: none;
            border: none;
            color: #ccc;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn.active {
            background: var(--gold);
            color: #0a0f1c;
        }
        .export-btn, .import-btn {
            background: #2a374b;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: var(--gold-light);
            font-weight: 500;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .import-btn { background: #1e2a3e; }

        /* تایتل اصلی */
        .main-title {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FFD89A, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* کارت آمار */
        .stats-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 14px 18px;
            margin: 12px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #f59e0b30;
        }
        .stat-item { text-align: center; flex: 1; }
        .stat-number { font-size: 1.6rem; font-weight: bold; color: var(--gold); }
        .stat-label { font-size: 0.7rem; color: #bbb; }
        .surprise-btn { background: #2a374b; border: none; padding: 8px 14px; border-radius: 40px; color: var(--gold-light); cursor: pointer; font-size: 0.75rem; }

        /* فیلتر */
        .filter-strip { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; border-bottom: 1px solid var(--border-dim); padding-bottom: 12px; }
        .filter-pill { background: #111927; padding: 6px 18px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; color: #b9c7dd; }
        .filter-pill.active { background: var(--gold); color: #0a0f1c; }

        /* کارت فیلم (قابل کلیک برای جزییات) */
        .movie-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            gap: 15px;
            border: 1px solid #2a354b;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .movie-card:active { transform: scale(0.99); }
        .movie-img { width: 70px; height: 100px; background: #0f1725; border-radius: 20px; object-fit: cover; }
        .movie-details { flex: 1; }
        .movie-title-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .movie-title { font-weight: 700; font-size: 1rem; }
        .stars { color: var(--gold); letter-spacing: 2px; font-size: 0.8rem; }
        .movie-meta { font-size: 0.7rem; color: #94a3b8; margin: 6px 0; display: flex; gap: 16px; flex-wrap: wrap; }
        .journal-snippet { background: #0f172ab3; padding: 6px 10px; border-radius: 20px; font-size: 0.7rem; color: #cddcff; margin: 8px 0; }
        .card-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .icon-btn { background: none; border: none; color: #cbd5e6; font-size: 0.7rem; padding: 4px 12px; border-radius: 30px; background: #1e2a3e; cursor: pointer; }
        .edit-btn { background: #3b2a1f; color: var(--gold-light); }

        /* دکمه شناور + */
        .floating-add { position: fixed; bottom: 28px; left: 28px; background: var(--gold); color: #0a0a0a; width: 56px; height: 56px; border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; box-shadow: 0 6px 16px rgba(245,158,11,0.5); cursor: pointer; z-index: 20; border: none; }

        /* فرم و جزییات */
        .form-card, .detail-card {
            background: rgba(12, 20, 30, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 44px;
            padding: 24px 20px;
            border: 1px solid #3a415a;
        }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: var(--gold-light); }
        .input-group input, .input-group select, .input-group textarea { width: 100%; background: #0b111f; border: 1px solid #2f3b54; padding: 12px 16px; border-radius: 34px; color: white; font-size: 0.9rem; }
        .star-selector { display: flex; gap: 12px; font-size: 32px; direction: ltr; }
        .star-selector span { cursor: pointer; color: #4a5568; }
        .star-selector .star-on { color: var(--gold); }
        .like-check { display: flex; align-items: center; gap: 12px; background: #111a28; padding: 10px 16px; border-radius: 44px; width: fit-content; cursor: pointer; }
        .save-btn { background: linear-gradient(95deg, var(--gold), #f97316); border: none; width: 100%; padding: 14px; border-radius: 50px; font-weight: bold; font-size: 1rem; color: #0a0f1c; margin-top: 12px; cursor: pointer; }
        .back-home { background: none; border: none; color: var(--gold-light); margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        /* پلی لیست */
        .playlist-section { margin-top: 16px; }
        .playlist-card { background: #0f142ab3; border-radius: 28px; padding: 16px; margin-bottom: 16px; }
        .playlist-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        .playlist-title { font-weight: bold; color: var(--gold); }
        .playlist-movies { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .playlist-movie-tag { background: #1e2a3e; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 5px; }
        .add-to-playlist-btn, .delete-playlist-btn { background: #2a3a55; border: none; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; cursor: pointer; margin-right: 6px; }
        .create-playlist-btn { background: var(--gold); color: black; border: none; border-radius: 30px; padding: 6px 14px; font-size: 0.8rem; margin-bottom: 12px; cursor: pointer; }

        .empty-msg { text-align: center; padding: 30px; color: #6a7894; }
        hr { border-color: #2a3448; margin: 16px 0; }
        .detail-poster { max-width: 100%; border-radius: 32px; margin-bottom: 20px; max-height: 250px; object-fit: contain; }
    </style>
</head>
<body>
<div class="container">
    <!-- نوار بالای صفحه -->
    <div class="top-bar">
        <div class="nav-buttons">
            <button class="nav-btn active" data-page="home">🏠 فیلم‌ها</button>
            <button class="nav-btn" data-page="playlists">📀 پلی‌لیست‌ها</button>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="export-btn" id="exportMoviesBtn">📤 خروجی JSON</button>
            <button class="import-btn" id="importMoviesBtn">📥 ورودی JSON</button>
            <input type="file" id="importFileInput" accept=".json" style="display:none">
        </div>
    </div>

    <!-- صفحه اصلی: لیست فیلم‌ها -->
    <div id="homePage" class="page">
        <div class="main-title">
            <span>📽️ دفتر سینما</span>
        </div>
        <div class="stats-card" id="statsArea">
            <div class="stat-item"><div class="stat-number" id="totalMovies">0</div><div class="stat-label">فیلم دیده</div></div>
            <div class="stat-item"><div class="stat-number" id="avgRating">0</div><div class="stat-label">میانگین ستاره</div></div>
            <button class="surprise-btn" id="surpriseBtn">🎁 پیشنهاد فیلم</button>
        </div>

        <div class="filter-strip" id="filterStrip">
            <div class="filter-pill active" data-filter="all">همه</div>
            <div class="filter-pill" data-filter="liked">❤️ لایک‌ها</div>
        </div>
        <div id="dynamicGenreFiltersHome" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;"></div>

        <div id="moviesListHome"><div class="empty-msg">✨ فیلمی ثبت نشده، دکمه + بزن</div></div>
    </div>

    <!-- صفحه پلی‌لیست‌ها (جدا) -->
    <div id="playlistsPage" class="page hidden-page">
        <button class="back-home" id="backFromPlaylistsBtn">← بازگشت به فیلم‌ها</button>
        <div class="playlist-section">
            <button class="create-playlist-btn" id="createPlaylistBtnOnPage">+ ساخت پلی‌لیست جدید</button>
            <div id="playlistsListContainer"></div>
        </div>
    </div>

    <!-- صفحه ثبت/ویرایش فیلم -->
    <div id="formPage" class="page hidden-page">
        <button class="back-home" id="backHomeBtn">← بازگشت به فیلم‌ها</button>
        <div class="form-card">
            <input type="hidden" id="editMovieId" value="">
            <div class="input-group"><label>🎬 نام فیلم</label><input type="text" id="filmName" placeholder="مثال: شهر اشباح"></div>
            <div class="input-group"><label>📅 سال ساخت</label><input type="number" id="filmYear" placeholder="۲۰۲۴"></div>
            <div class="input-group"><label>🎭 ژانر</label><select id="filmGenre"><option>اکشن</option><option>درام</option><option>کمدی</option><option>ترسناک</option><option>عاشقانه</option><option>علمی-تخیلی</option><option>جنایی</option><option>مستند</option></select></div>
            <div class="input-group"><label>⭐ امتیاز من</label><div class="star-selector" id="starPicker"><span data-val="1">☆</span><span data-val="2">☆</span><span data-val="3">☆</span><span data-val="4">☆</span><span data-val="5">☆</span></div></div>
            <div class="input-group"><label>🖼️ عکس فیلم</label><input type="file" id="filmPoster" accept="image/*"><small style="color:#9aaec0">اختیاری</small></div>
            <div class="input-group"><label>📔 یادداشت شخصی (ژورنال)</label><textarea id="filmJournal" rows="4"></textarea></div>
            <div class="like-check" id="likeCheckbox"><span>❤️</span> <span id="likeText">لایک نکردم</span></div>
            <button class="save-btn" id="submitFilmBtn">✔️ ثبت فیلم</button>
        </div>
    </div>

    <!-- صفحه جزییات فیلم (با کلیک روی کارت) -->
    <div id="detailPage" class="page hidden-page">
        <button class="back-home" id="backFromDetailBtn">← بازگشت به فیلم‌ها</button>
        <div class="detail-card" id="detailContent">
            <!-- جزییات فیلم -->
        </div>
    </div>

    <div class="floating-add" id="fabBtn">+</div>
</div>

<script>
    // ---------- داده‌ها ----------
    let movies = [];
    let playlists = [];
    let currentHomeFilter = "all";
    let tempRating = 0, tempLiked = false, tempPosterBase64 = "";
    let editModeId = null;

    // عناصر
    const homePage = document.getElementById('homePage');
    const playlistsPage = document.getElementById('playlistsPage');
    const formPage = document.getElementById('formPage');
    const detailPage = document.getElementById('detailPage');
    const fab = document.getElementById('fabBtn');
    const exportBtn = document.getElementById('exportMoviesBtn');
    const importBtn = document.getElementById('importMoviesBtn');
    const importFileInput = document.getElementById('importFileInput');
    const moviesContainer = document.getElementById('moviesListHome');
    const dynamicGenreDiv = document.getElementById('dynamicGenreFiltersHome');
    const totalSpan = document.getElementById('totalMovies');
    const avgSpan = document.getElementById('avgRating');
    const surpriseBtn = document.getElementById('surpriseBtn');

    // ناوبری بالا
    const navBtns = document.querySelectorAll('.nav-btn');
    function switchPage(pageId) {
        homePage.classList.add('hidden-page');
        playlistsPage.classList.add('hidden-page');
        formPage.classList.add('hidden-page');
        detailPage.classList.add('hidden-page');
        if (pageId === 'home') homePage.classList.remove('hidden-page');
        else if (pageId === 'playlists') playlistsPage.classList.remove('hidden-page');
        else if (pageId === 'form') formPage.classList.remove('hidden-page');
        else if (pageId === 'detail') detailPage.classList.remove('hidden-page');
        navBtns.forEach(btn => {
            btn.classList.remove('active');
            if ((pageId === 'home' && btn.getAttribute('data-page') === 'home') ||
                (pageId === 'playlists' && btn.getAttribute('data-page') === 'playlists'))
                btn.classList.add('active');
        });
        if (pageId === 'home') { renderHomeMovies(); renderPlaylists(); }
        if (pageId === 'playlists') renderPlaylists();
    }
    navBtns.forEach(btn => {
        btn.addEventListener('click', () => switchPage(btn.getAttribute('data-page')));
    });
    document.getElementById('backFromPlaylistsBtn').addEventListener('click', () => switchPage('home'));
    document.getElementById('backHomeBtn').addEventListener('click', () => switchPage('home'));
    document.getElementById('backFromDetailBtn').addEventListener('click', () => switchPage('home'));

    // ========== ذخیره و بارگذاری ==========
    function saveToLocal() {
        localStorage.setItem('cinemaMovies', JSON.stringify(movies));
        localStorage.setItem('cinemaPlaylists', JSON.stringify(playlists));
    }
    function loadFromLocal() {
        let storedMovies = localStorage.getItem('cinemaMovies');
        let storedPlaylists = localStorage.getItem('cinemaPlaylists');
        movies = storedMovies ? JSON.parse(storedMovies) : [];
        playlists = storedPlaylists ? JSON.parse(storedPlaylists) : [];
        if (playlists.length === 0) {
            playlists = [{ id: 1, name: "🎬 پیشنهادی", movieIds: [] }];
            saveToLocal();
        }
        renderHomeMovies();
        renderPlaylists();
        updateStats();
    }

    // آمار و سورپرایز
    function updateStats() {
        totalSpan.innerText = movies.length;
        let sum = movies.reduce((acc, m) => acc + m.rating, 0);
        let avg = movies.length ? (sum / movies.length).toFixed(1) : 0;
        avgSpan.innerText = avg;
    }
    surpriseBtn.addEventListener('click', () => {
        let top = movies.filter(m => m.rating === 5 && m.liked);
        if (top.length === 0) top = movies.filter(m => m.rating >= 4);
        if (top.length === 0) { alert("هنوز فیلم با امتیاز بالا نداریم"); return; }
        let rand = top[Math.floor(Math.random() * top.length)];
        alert(`🎁 پیشنهاد: ${rand.name} (${rand.rating} ستاره)\n📔 ${rand.journal || "بدون یادداشت"}`);
    });

    // ========== مدیریت فیلم‌ها ==========
    function resetForm(clearId = true) {
        filmName.value = ""; filmYear.value = ""; filmGenre.value = "اکشن";
        filmJournal.value = ""; filmPoster.value = ""; tempPosterBase64 = "";
        tempLiked = false; tempRating = 0;
        likeTextSpan.innerText = "لایک نکردم"; likeArea.style.background = "#111a28";
        updateStarUI(0);
        if (clearId) { editModeId = null; editMovieIdHidden.value = ""; }
    }
    function updateStarUI(rating) {
        starSpans.forEach((span, idx) => { span.innerHTML = (idx < rating) ? "★" : "☆"; });
        tempRating = rating;
    }
    const starSpans = document.querySelectorAll('#starPicker span');
    const likeArea = document.getElementById('likeCheckbox');
    const likeTextSpan = document.getElementById('likeText');
    const filmName = document.getElementById('filmName');
    const filmYear = document.getElementById('filmYear');
    const filmGenre = document.getElementById('filmGenre');
    const filmJournal = document.getElementById('filmJournal');
    const filmPoster = document.getElementById('filmPoster');
    const submitBtn = document.getElementById('submitFilmBtn');
    const editMovieIdHidden = document.getElementById('editMovieId');

    starSpans.forEach(span => {
        span.addEventListener('click', () => { updateStarUI(parseInt(span.getAttribute('data-val'))); });
    });
    likeArea.addEventListener('click', () => {
        tempLiked = !tempLiked;
        likeTextSpan.innerText = tempLiked ? "لایک کردم ❤️" : "لایک نکردم";
        likeArea.style.background = tempLiked ? "#932020" : "#111a28";
    });
    filmPoster.addEventListener('change', (e) => {
        let file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            let reader = new FileReader();
            reader.onload = (ev) => { tempPosterBase64 = ev.target.result; };
            reader.readAsDataURL(file);
        } else tempPosterBase64 = "";
    });

    function saveMovieFromForm() {
        let name = filmName.value.trim();
        let year = filmYear.value.trim();
        if (!name || !year) { alert("نام و سال فیلم لازم است"); return; }
        let movieData = {
            id: editModeId || Date.now(),
            name: name,
            year: year,
            genre: filmGenre.value,
            rating: tempRating,
            liked: tempLiked,
            journal: filmJournal.value.trim(),
            posterBase64: tempPosterBase64 || ""
        };
        if (editModeId) {
            let index = movies.findIndex(m => m.id === editModeId);
            if (index !== -1) movies[index] = movieData;
        } else {
            movies.unshift(movieData);
        }
        saveToLocal();
        switchPage('home');
        resetForm(true);
        updateStats();
        renderHomeMovies(); // اطمینان از نمایش
    }
    function deleteMovieById(id) {
        if (confirm("حذف فیلم از دفترچه؟")) {
            movies = movies.filter(m => m.id !== id);
            playlists.forEach(pl => { pl.movieIds = pl.movieIds.filter(mid => mid !== id); });
            saveToLocal();
            renderHomeMovies();
            renderPlaylists();
            updateStats();
            if (!detailPage.classList.contains('hidden-page')) switchPage('home');
        }
    }
    function editMovieById(id) {
        let movie = movies.find(m => m.id === id);
        if (!movie) return;
        editModeId = movie.id;
        editMovieIdHidden.value = movie.id;
        filmName.value = movie.name;
        filmYear.value = movie.year;
        filmGenre.value = movie.genre;
        filmJournal.value = movie.journal || "";
        tempRating = movie.rating;
        updateStarUI(movie.rating);
        tempLiked = movie.liked;
        likeTextSpan.innerText = movie.liked ? "لایک کردم ❤️" : "لایک نکردم";
        likeArea.style.background = movie.liked ? "#932020" : "#111a28";
        tempPosterBase64 = movie.posterBase64 || "";
        filmPoster.value = "";
        switchPage('form');
    }
    submitBtn.addEventListener('click', saveMovieFromForm);

    // ========== صفحه جزییات ==========
    function showDetail(movieId) {
        let movie = movies.find(m => m.id === movieId);
        if (!movie) return;
        let starFull = "★".repeat(movie.rating) + "☆".repeat(5-movie.rating);
        let posterHtml = movie.posterBase64 ? `<img class="detail-poster" src="${movie.posterBase64}" alt="پوستر">` : `<div style="text-align:center; padding:40px; background:#111; border-radius:32px;">🎞️ بدون عکس</div>`;
        let journalHtml = movie.journal ? `<div style="margin-top:20px; background:#0f172a; padding:16px; border-radius:28px;"><strong>📔 ژورنال کامل:</strong><br>${escapeHtml(movie.journal)}</div>` : `<div style="margin-top:20px; color:#aaa;">📭 یادداشتی ثبت نشده</div>`;
        let html = `
            <h2 style="color:var(--gold); margin-bottom:12px;">${escapeHtml(movie.name)}</h2>
            ${posterHtml}
            <div style="display:flex; gap:16px; flex-wrap:wrap; margin:12px 0;">
                <span>📅 ${movie.year}</span>
                <span>🎭 ${movie.genre}</span>
                <span>⭐ ${starFull}</span>
                <span>❤️ ${movie.liked ? "لایک شده" : "لایک نشده"}</span>
            </div>
            ${journalHtml}
            <div style="display: flex; gap: 16px; margin-top: 30px;">
                <button class="icon-btn edit-btn" id="detailEditBtn">✏️ ویرایش فیلم</button>
                <button class="icon-btn" id="detailDeleteBtn">🗑️ حذف فیلم</button>
            </div>
        `;
        document.getElementById('detailContent').innerHTML = html;
        document.getElementById('detailEditBtn').addEventListener('click', () => { editMovieById(movie.id); });
        document.getElementById('detailDeleteBtn').addEventListener('click', () => { deleteMovieById(movie.id); switchPage('home'); });
        switchPage('detail');
    }

    // ========== رندر صفحه اصلی (کارت‌ها) ==========
    function renderHomeMovies() {
        let filtered = [...movies];
        if (currentHomeFilter === "liked") filtered = filtered.filter(m => m.liked);
        else if (currentHomeFilter !== "all") filtered = filtered.filter(m => m.genre === currentHomeFilter);
        document.getElementById('movieCountBadge') && (document.getElementById('movieCountBadge').innerText = movies.length + " فیلم");
        if (filtered.length === 0) {
            moviesContainer.innerHTML = `<div class="empty-msg">📭 فیلمی در این دسته نیست</div>`;
        } else {
            let html = '';
            filtered.forEach(m => {
                let starShow = "★".repeat(m.rating) + "☆".repeat(5-m.rating);
                let likedIcon = m.liked ? '❤️' : '🤍';
                let posterHtml = m.posterBase64 ? `<img class="movie-img" src="${m.posterBase64}">` : `<div class="movie-img" style="display:flex; align-items:center; justify-content:center;">🎞️</div>`;
                html += `
                    <div class="movie-card" data-id="${m.id}">
                        ${posterHtml}
                        <div class="movie-details">
                            <div class="movie-title-row">
                                <span class="movie-title">${escapeHtml(m.name)}</span>
                                <span class="stars">${starShow}</span>
                            </div>
                            <div class="movie-meta"><span>📅 ${m.year}</span><span>🎭 ${m.genre}</span><span>${likedIcon} ${m.liked ? "لایک" : ""}</span></div>
                            ${m.journal ? `<div class="journal-snippet">📔 ${escapeHtml(m.journal.substring(0,70))}${m.journal.length>70?'...':''}</div>` : ''}
                            <div class="card-actions">
                                <button class="icon-btn like-action" data-id="${m.id}">❤️ لایک</button>
                                <button class="icon-btn edit-action" data-id="${m.id}">✏️ ویرایش</button>
                                <button class="icon-btn delete-action" data-id="${m.id}">🗑️ حذف</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            moviesContainer.innerHTML = html;
            // رویدادها
            document.querySelectorAll('.movie-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('icon-btn')) return;
                    let id = parseInt(card.getAttribute('data-id'));
                    showDetail(id);
                });
            });
            document.querySelectorAll('.like-action').forEach(btn => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); toggleLike(parseInt(btn.getAttribute('data-id'))); });
            });
            document.querySelectorAll('.edit-action').forEach(btn => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); editMovieById(parseInt(btn.getAttribute('data-id'))); });
            });
            document.querySelectorAll('.delete-action').forEach(btn => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); deleteMovieById(parseInt(btn.getAttribute('data-id'))); });
            });
        }
        buildGenreFilters();
        updateStats();
    }
    function toggleLike(id) {
        let m = movies.find(mv => mv.id === id);
        if (m) { m.liked = !m.liked; saveToLocal(); renderHomeMovies(); updateStats(); }
    }
    function buildGenreFilters() {
        let genres = [...new Set(movies.map(m => m.genre))];
        let btnsHtml = genres.map(g => `<div class="filter-pill" data-genre="${g}">${g}</div>`).join('');
        dynamicGenreDiv.innerHTML = btnsHtml;
        document.querySelectorAll('#dynamicGenreFiltersHome .filter-pill').forEach(btn => {
            btn.addEventListener('click', () => {
                currentHomeFilter = btn.getAttribute('data-genre');
                renderHomeMovies();
                highlightMainFilter(null);
            });
        });
    }
    function highlightMainFilter(active) {
        document.querySelectorAll('#filterStrip .filter-pill').forEach(p => p.classList.remove('active'));
        if (active === 'all') document.querySelector('#filterStrip .filter-pill[data-filter="all"]')?.classList.add('active');
        else if (active === 'liked') document.querySelector('#filterStrip .filter-pill[data-filter="liked"]')?.classList.add('active');
    }
    document.querySelectorAll('#filterStrip .filter-pill').forEach(pill => {
        pill.addEventListener('click', () => {
            currentHomeFilter = pill.getAttribute('data-filter');
            renderHomeMovies();
            highlightMainFilter(currentHomeFilter);
        });
    });

    // ========== پلی‌لیست‌ها (صفحه جدا) ==========
    function renderPlaylists() {
        let container = document.getElementById('playlistsListContainer');
        if (!container) return;
        if (!playlists.length) { container.innerHTML = "<div class='empty-msg'>پلی‌لیستی نداریم، بسازید</div>"; return; }
        let html = "";
        playlists.forEach(pl => {
            let movieItems = pl.movieIds.map(id => {
                let m = movies.find(mv => mv.id === id);
                return m ? `<span class="playlist-movie-tag">${escapeHtml(m.name)}</span>` : null;
            }).filter(v => v).join('');
            html += `
                <div class="playlist-card">
                    <div class="playlist-header">
                        <span class="playlist-title">${escapeHtml(pl.name)}</span>
                        <div>
                            <button class="add-to-playlist-btn" data-id="${pl.id}">➕ افزودن فیلم</button>
                            <button class="delete-playlist-btn" data-id="${pl.id}">🗑️ حذف لیست</button>
                        </div>
                    </div>
                    <div class="playlist-movies">${movieItems || "هیچ فیلمی اضافه نشده"}</div>
                </div>
            `;
        });
        container.innerHTML = html;
        document.querySelectorAll('.add-to-playlist-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { addMovieToPlaylistPrompt(parseInt(btn.getAttribute('data-id'))); });
        });
        document.querySelectorAll('.delete-playlist-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { deletePlaylistById(parseInt(btn.getAttribute('data-id'))); });
        });
    }
    function addMovieToPlaylistPrompt(playlistId) {
        if (movies.length === 0) { alert("فیلمی ثبت نشده"); return; }
        let list = movies.map((m,i)=>`${i+1} - ${m.name}`).join("\n");
        let input = prompt(`فیلم‌ها:\n${list}\n\nشماره یا اسم فیلم رو وارد کن:`);
        if (!input) return;
        let selected = null;
        if (!isNaN(input) && parseInt(input) > 0 && parseInt(input) <= movies.length)
            selected = movies[parseInt(input)-1];
        else
            selected = movies.find(m => m.name.toLowerCase() === input.toLowerCase());
        if (selected) {
            let pl = playlists.find(p => p.id === playlistId);
            if (pl && !pl.movieIds.includes(selected.id)) {
                pl.movieIds.push(selected.id);
                saveToLocal();
                renderPlaylists();
                alert(`✅ ${selected.name} به پلی‌لیست اضافه شد`);
            } else alert("فیلم تکراری یا نامعتبر");
        } else alert("پیدا نشد");
    }
    function deletePlaylistById(id) {
        if (confirm("پلی‌لیست حذف شود؟ فیلم‌ها حذف نمی‌شوند")) {
            playlists = playlists.filter(p => p.id !== id);
            saveToLocal();
            renderPlaylists();
        }
    }
    document.getElementById('createPlaylistBtnOnPage').addEventListener('click', () => {
        let name = prompt("اسم پلی‌لیست جدید:");
        if (name && name.trim()) {
            playlists.push({ id: Date.now(), name: name.trim(), movieIds: [] });
            saveToLocal();
            renderPlaylists();
        }
    });

    // ========== Import/Export ==========
    exportBtn.addEventListener('click', () => {
        let data = { movies: movies, playlists: playlists };
        let jsonStr = JSON.stringify(data, null, 2);
        let blob = new Blob([jsonStr], {type: "application/json"});
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `cinema_export_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    });
    importBtn.addEventListener('click', () => {
        importFileInput.click();
    });
    importFileInput.addEventListener('change', (e) => {
        let file = e.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = (ev) => {
            try {
                let imported = JSON.parse(ev.target.result);
                if (imported.movies && Array.isArray(imported.movies)) {
                    movies = imported.movies;
                    playlists = imported.playlists && Array.isArray(imported.playlists) ? imported.playlists : [];
                    saveToLocal();
                    renderHomeMovies();
                    renderPlaylists();
                    updateStats();
                    alert("ورودی با موفقیت جایگزین شد");
                } else {
                    alert("فرمت فایل نامعتبر است");
                }
            } catch (err) {
                alert("خطا در خواندن فایل");
            }
            importFileInput.value = '';
        };
        reader.readAsText(file);
    });

    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // دکمه شناور
    fab.addEventListener('click', () => { resetForm(true); switchPage('form'); });

    // اضافه کردن badge count در صورت وجود (در هدر نیست، ولی برای اطمینان)
    if (!document.getElementById('movieCountBadge')) {
        let badge = document.createElement('div');
        badge.id = 'movieCountBadge';
        badge.style.display = 'none';
        document.body.appendChild(badge);
    }

    // آغاز
    loadFromLocal();
    switchPage('home');
</script>
</body>
</html>
